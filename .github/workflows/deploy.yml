name: Deploy to Xserver VPS

on:
  push:
    branches:
      - main  # メインブランチにプッシュされたときに実行

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check Secrets Visibility (Diagnostic)
        run: |
          if [ -n "${{ secrets.SERVER_IP }}" ]; then echo "SERVER_IP is SET"; else echo "SERVER_IP is MISSING"; fi
          if [ -n "${{ secrets.SERVER_USER }}" ]; then echo "SERVER_USER is SET"; else echo "SERVER_USER is MISSING"; fi
          if [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "SSH_PRIVATE_KEY is SET"; else echo "SSH_PRIVATE_KEY is MISSING"; fi

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60m
          command_timeout: 60m
          script: |
            cd /var/www/tomoe_web
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml ps
            docker system prune -f
            # ホスト側の Nginx をリロードして設定を反映（sudo権限が必要な場合があります）
            sudo nginx -t && sudo nginx -s reload || echo "Nginx reload failed, please check manually."

