name: Deploy to Xserver VPS

on:
  push:
    branches:
      - main  # メインブランチにプッシュされたときに実行

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check Secrets Visibility (Diagnostic)
        run: |
          if [ -n "${{ secrets.SERVER_IP }}" ]; then echo "SERVER_IP is SET"; else echo "SERVER_IP is MISSING"; fi
          if [ -n "${{ secrets.SERVER_USER }}" ]; then echo "SERVER_USER is SET"; else echo "SERVER_USER is MISSING"; fi
          if [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "SSH_PRIVATE_KEY is SET"; else echo "SSH_PRIVATE_KEY is MISSING"; fi

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            sudo chown -R $USER:$USER /var/www/tomoe_web || true
            git config --global --add safe.directory /var/www/tomoe_web
            cd /var/www/tomoe_web
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker system prune -f

