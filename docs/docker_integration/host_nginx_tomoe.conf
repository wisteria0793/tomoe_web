# VPS（ホスト側）の Nginx 設定ファイル: /etc/nginx/sites-enabled/tomoe
# このファイルを VPS 上の /etc/nginx/sites-available/tomoe に保存し、
# sites-enabled にシンボリックリンクを作成して利用してください。

server {
    server_name hakodate-tomoe.com www.hakodate-tomoe.com;
    client_max_body_size 10M;

    # フロントエンド：Docker コンテナ (Port 3001) へプロキシ
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # バックエンド API：Docker コンテナ (Port 8100) へプロキシ
    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django 管理画面：Docker コンテナ (Port 8100) へプロキシ
    location /admin/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静的ファイル (Django Admin 等)
    location /static/admin/ {
        proxy_pass http://127.0.0.1:8100/static/admin/;
        proxy_set_header Host $host;
    }

    location /static/rest_framework/ {
        proxy_pass http://127.0.0.1:8100/static/rest_framework/;
        proxy_set_header Host $host;
    }

    # Django Media
    location /media/ {
        proxy_pass http://127.0.0.1:8100/media/;
        proxy_set_header Host $host;
    }

    # SSL 設定（既存の Certbot 設定をそのまま利用）
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/hakodate-tomoe.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/hakodate-tomoe.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTPからHTTPSへのリダイレクト（変更なし）
server {
    listen 80;
    server_name hakodate-tomoe.com www.hakodate-tomoe.com;
    return 301 https://$host$request_uri;
}
